version: "3.9"

services:

  mysql:
    image: mysql:8.4
    container_name: crisisview-db-staging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-crisisview}
    ports:
      - "3307:3306"
    volumes:
      - crisisview_db_staging:/var/lib/mysql
    networks:
      - staging-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-crisisview-api:latest}
    container_name: crisisview-api-staging
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: staging
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${MYSQL_DATABASE:-crisisview}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - staging-net
    restart: unless-stopped

networks:
  staging-net:
    name: staging-net

volumes:
  crisisview_db_staging:
